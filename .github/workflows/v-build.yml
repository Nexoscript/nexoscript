name: V Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install dependencies
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y unzip curl

      # Step 3: Install V compiler
      - name: Install V
        run: |
          curl -LO https://github.com/vlang/v/releases/latest/download/v_linux.zip
          unzip v_linux.zip
          chmod +x v/v
          sudo mv v/v /usr/local/bin/v

      # Step 4: Verify V installation
      - name: Verify V installation
        run: v version

      # Step 5: Build the project
      - name: Build project
        run: v run main.v
